<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Road Bump Detector</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      background: #1a1d27;
      border-bottom: 1px solid #2d3148;
      padding: 18px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header .logo {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #f59e0b, #ef4444);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    header h1 { font-size: 1.25rem; font-weight: 600; color: #f1f5f9; }
    header p { font-size: 0.78rem; color: #64748b; margin-top: 1px; }

    .badge {
      margin-left: auto;
      background: #1e293b;
      border: 1px solid #334155;
      color: #94a3b8;
      font-size: 0.7rem;
      padding: 4px 10px;
      border-radius: 20px;
    }

    main {
      width: 100%;
      max-width: 960px;
      padding: 40px 24px;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .card {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 14px;
      padding: 28px;
    }

    .card-title {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #64748b;
      margin-bottom: 16px;
      font-weight: 600;
    }

    /* Drop zone */
    #drop-zone {
      border: 2px dashed #334155;
      border-radius: 10px;
      padding: 48px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }
    #drop-zone:hover, #drop-zone.drag-over {
      border-color: #f59e0b;
      background: #1e2030;
    }
    #drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }
    #drop-zone .icon { font-size: 2.5rem; margin-bottom: 10px; }
    #drop-zone .hint { color: #64748b; font-size: 0.88rem; }
    #drop-zone .hint span { color: #f59e0b; font-weight: 600; }

    /* Preview */
    #preview-section { display: none; }
    #preview-img {
      width: 100%;
      max-height: 320px;
      object-fit: contain;
      border-radius: 8px;
      background: #0f1117;
    }
    .file-info {
      margin-top: 10px;
      font-size: 0.82rem;
      color: #64748b;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .change-btn {
      background: none;
      border: 1px solid #334155;
      color: #94a3b8;
      font-size: 0.78rem;
      padding: 3px 10px;
      border-radius: 6px;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .change-btn:hover { border-color: #f59e0b; color: #f59e0b; }

    /* Controls */
    .controls { display: flex; flex-direction: column; gap: 18px; }

    .slider-row {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .slider-label {
      font-size: 0.85rem;
      color: #94a3b8;
      min-width: 160px;
    }
    .slider-label strong { color: #e2e8f0; }

    input[type="range"] {
      flex: 1;
      -webkit-appearance: none;
      height: 4px;
      border-radius: 4px;
      background: #2d3148;
      outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #f59e0b;
      cursor: pointer;
      border: 3px solid #0f1117;
      box-shadow: 0 0 0 1px #f59e0b40;
    }

    .conf-value {
      font-size: 0.88rem;
      font-weight: 600;
      color: #f59e0b;
      min-width: 36px;
      text-align: right;
    }

    /* Button */
    #detect-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #f59e0b, #ef4444);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.03em;
      transition: opacity 0.2s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    #detect-btn:hover:not(:disabled) { opacity: 0.9; }
    #detect-btn:active:not(:disabled) { transform: scale(0.99); }
    #detect-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Spinner */
    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Results */
    #result-section { display: none; }

    .result-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    @media (max-width: 600px) { .result-grid { grid-template-columns: 1fr; } }

    .result-pane { display: flex; flex-direction: column; gap: 8px; }
    .result-pane-label {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #64748b;
      font-weight: 600;
    }
    .result-pane img {
      width: 100%;
      border-radius: 8px;
      background: #0f1117;
      object-fit: contain;
    }

    /* Error */
    #error-box {
      display: none;
      background: #3b0f0f;
      border: 1px solid #7f1d1d;
      border-radius: 10px;
      padding: 14px 18px;
      color: #fca5a5;
      font-size: 0.88rem;
    }

    /* Status dot */
    #status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
      display: inline-block;
      margin-right: 6px;
      box-shadow: 0 0 6px #22c55e80;
    }
    #status-dot.offline { background: #ef4444; box-shadow: 0 0 6px #ef444480; }
    #status-text { font-size: 0.78rem; color: #64748b; }

    footer {
      margin-top: auto;
      padding: 24px;
      font-size: 0.75rem;
      color: #334155;
      text-align: center;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">🚧</div>
  <div>
    <h1>Road Bump Detector</h1>
    <p>YOLOv11 Object Detection</p>
  </div>
  <div class="badge">
    <span id="status-dot"></span>
    <span id="status-text">Checking API…</span>
  </div>
</header>

<main>

  <!-- Upload card -->
  <div class="card">
    <div class="card-title">Upload Image</div>

    <div id="drop-zone">
      <input type="file" id="file-input" accept="image/*" />
      <div class="icon">📁</div>
      <p style="font-size:1rem; font-weight:600; margin-bottom:6px;">Drop image here</p>
      <p class="hint">or <span>click to browse</span></p>
    </div>

    <div id="preview-section" style="margin-top:16px;">
      <img id="preview-img" alt="Preview" />
      <div class="file-info">
        <span id="file-name"></span>
        <button class="change-btn" onclick="resetUpload()">Change</button>
      </div>
    </div>
  </div>

  <!-- Controls card -->
  <div class="card controls">
    <div class="card-title">Settings</div>

    <div class="slider-row">
      <div class="slider-label">Confidence threshold: <strong id="conf-label">0.25</strong></div>
      <input type="range" id="conf-slider" min="0.10" max="0.90" step="0.05" value="0.25"
             oninput="updateConf(this.value)" />
    </div>

    <div id="error-box"></div>

    <button id="detect-btn" onclick="detect()" disabled>
      <div class="spinner" id="spinner"></div>
      <span id="btn-text">Detect Road Bumps</span>
    </button>
  </div>

  <!-- Results card -->
  <div class="card" id="result-section">
    <div class="card-title">Detection Result</div>
    <div class="result-grid">
      <div class="result-pane">
        <div class="result-pane-label">Original</div>
        <img id="original-img" alt="Original" />
      </div>
      <div class="result-pane">
        <div class="result-pane-label">Detected</div>
        <img id="result-img" alt="Detected" />
      </div>
    </div>
  </div>

</main>

<footer>Road Bump Detection &mdash; FYP Demo &mdash; Powered by YOLOv11 + FastAPI</footer>

<script>
  let selectedFile = null;

  // Health check on load
  async function checkHealth() {
    try {
      const r = await fetch('/health');
      const ok = r.ok && (await r.json()).ok;
      setStatus(ok);
    } catch {
      setStatus(false);
    }
  }

  function setStatus(online) {
    const dot = document.getElementById('status-dot');
    const txt = document.getElementById('status-text');
    dot.className = online ? '' : 'offline';
    txt.textContent = online ? 'API Online' : 'API Offline';
  }

  // Drag and drop
  const dropZone = document.getElementById('drop-zone');
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    const f = e.dataTransfer.files[0];
    if (f && f.type.startsWith('image/')) loadFile(f);
  });

  document.getElementById('file-input').addEventListener('change', e => {
    const f = e.target.files[0];
    if (f) loadFile(f);
  });

  function loadFile(file) {
    selectedFile = file;
    const reader = new FileReader();
    reader.onload = ev => {
      document.getElementById('preview-img').src = ev.target.result;
      document.getElementById('file-name').textContent = file.name;
      document.getElementById('drop-zone').style.display = 'none';
      document.getElementById('preview-section').style.display = 'block';
      document.getElementById('detect-btn').disabled = false;
      document.getElementById('result-section').style.display = 'none';
      hideError();
    };
    reader.readAsDataURL(file);
  }

  function resetUpload() {
    selectedFile = null;
    document.getElementById('file-input').value = '';
    document.getElementById('drop-zone').style.display = 'block';
    document.getElementById('preview-section').style.display = 'none';
    document.getElementById('detect-btn').disabled = true;
    document.getElementById('result-section').style.display = 'none';
    hideError();
  }

  function updateConf(v) {
    document.getElementById('conf-label').textContent = parseFloat(v).toFixed(2);
  }

  async function detect() {
    if (!selectedFile) return;
    const conf = document.getElementById('conf-slider').value;

    setLoading(true);
    hideError();

    try {
      const form = new FormData();
      form.append('image', selectedFile);
      form.append('conf', conf);

      const res = await fetch(`/predict?conf=${conf}`, {
        method: 'POST',
        body: form,
      });

      if (!res.ok) {
        const err = await res.text();
        throw new Error(`Server error ${res.status}: ${err}`);
      }

      const data = await res.json();
      const b64 = data.image_base64_png;

      document.getElementById('original-img').src = document.getElementById('preview-img').src;
      document.getElementById('result-img').src = 'data:image/png;base64,' + b64;
      document.getElementById('result-section').style.display = 'block';
      document.getElementById('result-section').scrollIntoView({ behavior: 'smooth', block: 'start' });

    } catch (e) {
      showError(e.message || 'Failed to connect to API. Make sure the server is running.');
    } finally {
      setLoading(false);
    }
  }

  function setLoading(on) {
    const btn = document.getElementById('detect-btn');
    const spinner = document.getElementById('spinner');
    const txt = document.getElementById('btn-text');
    btn.disabled = on;
    spinner.style.display = on ? 'block' : 'none';
    txt.textContent = on ? 'Detecting…' : 'Detect Road Bumps';
  }

  function showError(msg) {
    const box = document.getElementById('error-box');
    box.textContent = '⚠ ' + msg;
    box.style.display = 'block';
  }

  function hideError() {
    document.getElementById('error-box').style.display = 'none';
  }

  checkHealth();
</script>
</body>
</html>
